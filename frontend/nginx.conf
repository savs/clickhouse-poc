# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # Served from a writable directory managed by docker-entrypoint.sh.
    # At startup that directory holds either the real Let's Encrypt cert
    # (mounted via the cert-manager Secret) or a temporary self-signed cert
    # generated as a fallback when the Secret is not yet available.
    ssl_certificate     /etc/nginx/ssl-live/tls.crt;
    ssl_certificate_key /etc/nginx/ssl-live/tls.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root  /usr/share/nginx/html;
    index index.html;

    # Require basic auth for all locations (overridden below for telemetry)
    auth_basic           "Travel App";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Proxy GraphQL API to booking-service (no CORS needed — same origin from browser's perspective)
    location /graphql {
        proxy_pass         http://booking-service:4000/graphql;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Content-Type $http_content_type;
    }

    # Proxy OTel signals to Alloy — exempt from auth (SDK sends no credentials)
    location /v1/ {
        auth_basic off;
        proxy_pass       http://alloy:4318/v1/;
        proxy_set_header Content-Type $http_content_type;
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
