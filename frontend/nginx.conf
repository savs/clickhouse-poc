server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy GraphQL API to booking-service (no CORS needed — same origin from browser's perspective)
    location /graphql {
        proxy_pass         http://booking-service:4000/graphql;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Content-Type $http_content_type;
    }

    # Proxy OTel signals to Alloy (browser cannot reach alloy:4318 directly — Docker internal)
    location /v1/ {
        proxy_pass       http://alloy:4318/v1/;
        proxy_set_header Content-Type $http_content_type;
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
