# Grafana Private Datasource Connect Configuration

# Listening configuration
server:
  host: 0.0.0.0
  port: 8080

# Connection to private datasources
datasources:
  - name: clickhouse
    type: clickhouse
    url: http://clickhouse:8123
    username: grafana
    password: grafana
    settings:
      database: default
      protocol: native

# Grafana connection settings
grafana:
  url: http://grafana:3000
  # Authentication token for PDC
  token: your-pdc-token-here

# Logging configuration
logging:
  level: info
  format: json

# Security settings
security:
  # Enable TLS for connections
  tls:
    enabled: false
  # Token-based authentication
  auth:
    type: token
