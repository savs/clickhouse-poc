apiVersion: apps/v1
kind: Deployment
metadata:
  name: pdc
  namespace: travel-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pdc
  template:
    metadata:
      labels:
        app: pdc
    spec:
      containers:
        - name: pdc
          image: grafana/pdc-agent:latest
          args:
            - -token
            - $(GCLOUD_PDC_SIGNING_TOKEN)
            - -cluster
            - $(GCLOUD_PDC_CLUSTER)
            - -gcloud-hosted-grafana-id
            - $(GCLOUD_HOSTED_GRAFANA_ID)
          env:
            - name: GCLOUD_PDC_SIGNING_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pdc-credentials
                  key: GCLOUD_PDC_SIGNING_TOKEN
            - name: GCLOUD_PDC_CLUSTER
              valueFrom:
                secretKeyRef:
                  name: pdc-credentials
                  key: GCLOUD_PDC_CLUSTER
            - name: GCLOUD_HOSTED_GRAFANA_ID
              valueFrom:
                secretKeyRef:
                  name: pdc-credentials
                  key: GCLOUD_HOSTED_GRAFANA_ID
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
