apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: travel-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ${ECR_REGISTRY}/${ECR_REPO}:frontend-${IMAGE_TAG}
          ports:
            - containerPort: 80
            - containerPort: 443
          volumeMounts:
            - name: frontend-tls
              mountPath: /etc/nginx/ssl
              readOnly: true
            - name: nginx-htpasswd
              mountPath: /etc/nginx/.htpasswd
              subPath: .htpasswd
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: frontend-tls
          secret:
            secretName: frontend-tls
            optional: true   # pod starts before cert-manager issues the cert
        - name: nginx-htpasswd
          secret:
            secretName: nginx-htpasswd
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: travel-app
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-additional-resource-tags: "owner=${ECR_REPO},project=travel-app"
    external-dns.alpha.kubernetes.io/hostname: ${HOSTNAME_PREFIX}frontend.${DNS_DOMAIN}
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: https
      port: 443
      targetPort: 443
