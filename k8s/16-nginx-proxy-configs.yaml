---
# nginx reverse proxy config for Grafana sidecar.
# Terminates TLS and enforces basic auth, then proxies to Grafana on localhost:3000.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-nginx-config
  namespace: travel-app
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl-live/tls.crt;
        ssl_certificate_key /etc/nginx/ssl-live/tls.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        auth_basic           "Travel App";
        auth_basic_user_file /etc/nginx/.htpasswd;

        location / {
            proxy_pass         http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
---
