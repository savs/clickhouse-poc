# ClusterIssuer: Let's Encrypt production via Route53 DNS-01 challenge.
# cert-manager uses the IRSA-annotated service account for Route53 access —
# no AWS access keys are needed here.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ${CERT_EMAIL}
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - dns01:
          route53:
            region: ${AWS_REGION}
            hostedZoneID: ${HOSTED_ZONE_ID_SHORT}
