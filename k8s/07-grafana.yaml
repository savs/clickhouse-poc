apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: travel-app
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: travel-app-ebs
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: travel-app
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      # fsGroup makes the PVC writable by the grafana user (uid 472).
      # runAsUser/runAsGroup are set per-container so the nginx sidecar
      # can run as its own (root) user.
      securityContext:
        fsGroup: 472
      containers:
        - name: grafana
          image: ${ECR_REGISTRY}/${ECR_REPO}:grafana-${IMAGE_TAG}
          securityContext:
            runAsUser: 472
            runAsGroup: 472
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Admin
            - name: GF_FEATURE_TOGGLES_ENABLE
              value: publicDashboards
            - name: GF_INSTALL_PLUGINS
              value: grafana-clickhouse-datasource
            - name: GF_TRACING_OPENTELEMETRY_OTLP_ADDRESS
              value: alloy:4317
            - name: GF_TRACING_OPENTELEMETRY_OTLP_PROPAGATION
              value: w3c
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi

        # nginx sidecar: terminates TLS, enforces basic auth, proxies to Grafana.
        - name: nginx-tls
          image: nginx:alpine
          command:
            - /bin/sh
            - -c
            - |
              printf '%s:%s\n' "$FRONTEND_USER" "$(openssl passwd -apr1 "$FRONTEND_PASSWORD")" \
                > /etc/nginx/.htpasswd
              mkdir -p /etc/nginx/ssl-live
              if [ -f /etc/nginx/ssl/tls.crt ]; then
                cp /etc/nginx/ssl/tls.crt /etc/nginx/ssl-live/tls.crt
                cp /etc/nginx/ssl/tls.key /etc/nginx/ssl-live/tls.key
              else
                openssl req -x509 -newkey rsa:2048 -keyout /etc/nginx/ssl-live/tls.key \
                  -out /etc/nginx/ssl-live/tls.crt -days 1 -nodes -subj "/CN=placeholder"
              fi
              ( while true; do sleep 60
                  if [ -f /etc/nginx/ssl/tls.crt ]; then
                    if ! diff -q /etc/nginx/ssl/tls.crt /etc/nginx/ssl-live/tls.crt >/dev/null 2>&1; then
                      cp /etc/nginx/ssl/tls.crt /etc/nginx/ssl-live/tls.crt
                      cp /etc/nginx/ssl/tls.key /etc/nginx/ssl-live/tls.key
                      nginx -s reload 2>/dev/null || true
                    fi
                  fi
                done ) &
              exec nginx -g 'daemon off;'
          env:
            - name: FRONTEND_USER
              valueFrom:
                secretKeyRef:
                  name: frontend-credentials
                  key: username
            - name: FRONTEND_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: frontend-credentials
                  key: password
          ports:
            - containerPort: 80
            - containerPort: 443
          volumeMounts:
            - name: grafana-tls
              mountPath: /etc/nginx/ssl
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 443
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: grafana-tls
          secret:
            secretName: grafana-tls
            optional: true   # pod starts before cert-manager issues the cert
        - name: nginx-config
          configMap:
            name: grafana-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: travel-app
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-additional-resource-tags: "owner=${ECR_REPO},project=travel-app"
    external-dns.alpha.kubernetes.io/hostname: ${HOSTNAME_PREFIX}grafana.${DNS_DOMAIN}
spec:
  type: LoadBalancer
  selector:
    app: grafana
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: https
      port: 443
      targetPort: 443
