apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: travel-app
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: travel-app-ebs
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: travel-app
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
        runAsUser: 472
        runAsGroup: 472
      containers:
        - name: grafana
          image: ${ECR_REGISTRY}/${ECR_REPO}:grafana-${IMAGE_TAG}
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Admin
            - name: GF_FEATURE_TOGGLES_ENABLE
              value: publicDashboards
            - name: GF_INSTALL_PLUGINS
              value: grafana-clickhouse-datasource
            - name: GF_TRACING_OPENTELEMETRY_OTLP_ADDRESS
              value: alloy:4317
            - name: GF_TRACING_OPENTELEMETRY_OTLP_PROPAGATION
              value: w3c
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: travel-app
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-additional-resource-tags: "owner=${ECR_REPO},project=travel-app"
spec:
  type: LoadBalancer
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
