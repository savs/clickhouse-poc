# RBAC resources for Grafana Alloy.
#
# Alloy needs permission to read pod logs via the Kubernetes API in order for
# loki.source.kubernetes to stream container stdout/stderr. Without this, pod
# discovery and log tailing both fail silently.
#
# The ClusterRole is cluster-scoped so that Alloy can also watch node metadata
# (used by discovery.kubernetes for enriching log labels). The binding is
# scoped to the alloy ServiceAccount in travel-app.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy
  namespace: travel-app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alloy
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods", "pods/log", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alloy
subjects:
  - kind: ServiceAccount
    name: alloy
    namespace: travel-app
roleRef:
  kind: ClusterRole
  name: alloy
  apiGroup: rbac.authorization.k8s.io
