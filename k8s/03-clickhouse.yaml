# Enable ClickHouse's built-in Prometheus endpoint at port 9363.
# Without this config, ClickHouse has no /metrics handler and Alloy's
# prometheus.scrape for clickhouse:8123 silently fails.
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-prometheus-config
  namespace: travel-app
data:
  prometheus.xml: |
    <clickhouse>
      <prometheus>
        <endpoint>/metrics</endpoint>
        <port>9363</port>
        <metrics>true</metrics>
        <asynchronous_metrics>true</asynchronous_metrics>
        <status_info>true</status_info>
        <events>true</events>
      </prometheus>
    </clickhouse>
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clickhouse-data
  namespace: travel-app
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: travel-app-ebs
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickhouse
  namespace: travel-app
spec:
  replicas: 1
  progressDeadlineSeconds: 900
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:latest
          ports:
            - containerPort: 8123
            - containerPort: 9000
            - containerPort: 9363
              name: prometheus
          env:
            - name: CLICKHOUSE_DB
              value: default
            - name: CLICKHOUSE_USER
              value: grafana
            - name: CLICKHOUSE_PASSWORD
              value: grafana
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
            - name: prometheus-config
              mountPath: /etc/clickhouse-server/config.d/prometheus.xml
              subPath: prometheus.xml
          readinessProbe:
            exec:
              command: ["clickhouse-client", "--query", "SELECT 1"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            exec:
              command: ["clickhouse-client", "--query", "SELECT 1"]
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: clickhouse-data
        - name: init-sql
          configMap:
            name: clickhouse-init
        - name: prometheus-config
          configMap:
            name: clickhouse-prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: travel-app
spec:
  selector:
    app: clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: native
      port: 9000
      targetPort: 9000
    - name: prometheus
      port: 9363
      targetPort: 9363
