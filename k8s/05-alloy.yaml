apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alloy-data
  namespace: travel-app
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: travel-app-ebs
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloy
  namespace: travel-app
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: alloy
  template:
    metadata:
      labels:
        app: alloy
    spec:
      containers:
        - name: alloy
          image: grafana/alloy:latest
          args:
            - run
            - /etc/alloy/config.alloy
            - --server.http.listen-addr=0.0.0.0:12345
            - --storage.path=/var/lib/alloy/data
          ports:
            - containerPort: 4317
            - containerPort: 4318
            - containerPort: 12345
          volumeMounts:
            - name: config
              mountPath: /etc/alloy/config.alloy
              subPath: config.alloy
            - name: data
              mountPath: /var/lib/alloy/data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: alloy-config
        - name: data
          persistentVolumeClaim:
            claimName: alloy-data
---
apiVersion: v1
kind: Service
metadata:
  name: alloy
  namespace: travel-app
spec:
  selector:
    app: alloy
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: ui
      port: 12345
      targetPort: 12345
