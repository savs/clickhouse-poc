apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alloy-data
  namespace: travel-app
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: travel-app-ebs
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloy
  namespace: travel-app
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: alloy
  template:
    metadata:
      labels:
        app: alloy
    spec:
      serviceAccountName: alloy
      containers:
        - name: alloy
          image: grafana/alloy:latest
          args:
            - run
            - /etc/alloy/config.alloy
            - --server.http.listen-addr=0.0.0.0:12345
            - --storage.path=/var/lib/alloy/data
          ports:
            - containerPort: 4317
            - containerPort: 4318
            - containerPort: 12345
          volumeMounts:
            - name: config
              mountPath: /etc/alloy/config.alloy
              subPath: config.alloy
            - name: data
              mountPath: /var/lib/alloy/data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

        # nginx sidecar: terminates TLS, enforces basic auth, proxies to Alloy UI.
        - name: nginx-tls
          image: nginx:alpine
          command:
            - /bin/sh
            - -c
            - |
              mkdir -p /etc/nginx/ssl-live
              if [ -f /etc/nginx/ssl/tls.crt ]; then
                cp /etc/nginx/ssl/tls.crt /etc/nginx/ssl-live/tls.crt
                cp /etc/nginx/ssl/tls.key /etc/nginx/ssl-live/tls.key
              else
                openssl req -x509 -newkey rsa:2048 -keyout /etc/nginx/ssl-live/tls.key \
                  -out /etc/nginx/ssl-live/tls.crt -days 1 -nodes -subj "/CN=placeholder"
              fi
              ( while true; do sleep 60
                  if [ -f /etc/nginx/ssl/tls.crt ]; then
                    if ! diff -q /etc/nginx/ssl/tls.crt /etc/nginx/ssl-live/tls.crt >/dev/null 2>&1; then
                      cp /etc/nginx/ssl/tls.crt /etc/nginx/ssl-live/tls.crt
                      cp /etc/nginx/ssl/tls.key /etc/nginx/ssl-live/tls.key
                      nginx -s reload 2>/dev/null || true
                    fi
                  fi
                done ) &
              exec nginx -g 'daemon off;'
          ports:
            - containerPort: 80
            - containerPort: 443
          volumeMounts:
            - name: alloy-tls
              mountPath: /etc/nginx/ssl
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
            - name: nginx-htpasswd
              mountPath: /etc/nginx/.htpasswd
              subPath: .htpasswd
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 443
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi

      volumes:
        - name: config
          configMap:
            name: alloy-config
        - name: data
          persistentVolumeClaim:
            claimName: alloy-data
        - name: alloy-tls
          secret:
            secretName: alloy-tls
            optional: true   # pod starts before cert-manager issues the cert
        - name: nginx-config
          configMap:
            name: alloy-nginx-config
        - name: nginx-htpasswd
          secret:
            secretName: nginx-htpasswd
---
# Internal ClusterIP service — used by other pods to send OTLP telemetry.
apiVersion: v1
kind: Service
metadata:
  name: alloy
  namespace: travel-app
spec:
  selector:
    app: alloy
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
---
# External LoadBalancer service — exposes the Alloy UI via HTTPS with basic auth.
apiVersion: v1
kind: Service
metadata:
  name: alloy-ui
  namespace: travel-app
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-additional-resource-tags: "owner=${ECR_REPO},project=travel-app"
    external-dns.alpha.kubernetes.io/hostname: ${HOSTNAME_PREFIX}alloy.${DNS_DOMAIN}
spec:
  type: LoadBalancer
  selector:
    app: alloy
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: https
      port: 443
      targetPort: 443
